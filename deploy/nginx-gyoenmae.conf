server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name 167.172.79.34 gyoenmae;

    root /var/www/gyoenmae;
    index index.html;

    client_max_body_size 15M;

    # ^~ ensures /api/ wins over the static-file regex below (DELETE /api/photos/*.svg etc.)
    location ^~ /api/ {
        auth_basic "Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
        proxy_pass http://127.0.0.1:3000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /adminphotos {
        auth_basic "Admin";
        auth_basic_user_file /etc/nginx/.htpasswd;
        try_files $uri $uri/ /adminphotos/index.html;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~* \.(css|js|png|jpg|jpeg|gif|svg|webp|ico|json)$ {
        expires 7d;
        add_header Cache-Control "public";
    }
}
