<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>Admin — Towa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;600&family=Source+Serif+4:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>
  <div class="wrap">
    <header>
      <h1>Admin</h1>
      <p class="login-status">Logged in via nginx</p>
    </header>

    <section class="rental-status-section">
      <h2>Rental status</h2>
      <p class="note">Controls the banner on the public site above the contact section. Vacant hides the banner.</p>
      <div id="status-message" class="message" role="status" aria-live="polite"></div>
      <div class="status-controls">
        <div class="status-toggle" role="group" aria-label="Rental status">
          <button type="button" class="btn status-btn active" id="status-vacant" data-status="vacant">Vacant</button>
          <button type="button" class="btn status-btn" id="status-rented" data-status="rented">Rented</button>
        </div>
        <label class="date-field" id="rented-until-field" hidden>
          <span class="date-label">Rented until</span>
          <input type="date" id="rented-until" name="rentedUntil">
        </label>
        <button type="button" class="btn btn-primary" id="save-status-btn">Save status</button>
      </div>
    </section>

    <section>
      <h2>Carousel photos</h2>
      <p class="note">Drag to reorder, or use ↑ ↓. Changes apply to the public hero carousel after you save order, upload, or delete.</p>
      <div id="message" class="message" role="status" aria-live="polite"></div>
      <ul class="photos" id="photo-list"></ul>
      <div class="toolbar">
        <button type="button" class="btn btn-primary" id="save-order-btn" disabled>Order saved</button>
      </div>
      <div class="upload-row">
        <input type="file" id="upload-input" accept=".jpg,.jpeg,.png,.webp,.svg,image/jpeg,image/png,image/webp,image/svg+xml">
        <button type="button" class="btn btn-primary" id="upload-btn">Upload photo</button>
      </div>
    </section>

    <footer>
      <a href="/">← Back to site</a>
    </footer>
  </div>
  <script src="admin.js"></script>
</body>
</html>
